<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPG Digital Asset Management Tool — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #003768;
      --orange:  #fcb034;
      --accent:  #2e99d5;
      --grey:    #6b7c8f;
      --light:   #f5f7fa;
      --border:  #e8ecf0;
      --dark:    #1a2a3a;
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #f5f7fa;
      margin: 0;
      overflow: hidden;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }


    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      position: relative;
    }


    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-lockup {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--blue);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 22px; height: 22px; }

    .logo-text {
      text-align: left;
    }

    .logo-text .brand {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -.2px;
      line-height: 1;
    }

    .logo-text .sub {
      display: block;
      font-size: 11px;
      color: var(--grey);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--grey);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      color: var(--dark);
      background: var(--light);
      transition: border-color .15s;
      outline: none;
      font-family: inherit;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--grey);
      padding: 4px;
      display: flex;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: .2px;
      transition: background .15s, transform .1s;
    }

    .btn:hover { background: #004a8a; }
    .btn:active { transform: scale(.99); }

    .error {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #c00;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--grey);
      margin-top: 24px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Hero triangles - bottom right -->
<svg style="position:fixed;bottom:0;right:0;width:52vw;height:85vh;pointer-events:none;" viewBox="0 0 520 500" preserveAspectRatio="xMaxYMax slice" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange triangle - right, partially off canvas -->
  <polygon points="420,180 700,500 700,500 420,500" fill="#fcb034"/>
  <polygon points="380,120 700,500 300,500" fill="#fcb034"/>
  <!-- Dark blue triangle - main, front -->
  <polygon points="210,0 520,500 0,500" fill="#003768"/>
</svg>

<div class="page-wrap">
  <div class="card">
    <div class="logo-area">
      <img src="/public-logo" alt="Finance Planning Group" style="height:56px;object-fit:contain;margin-bottom:8px;">
      <div style="font-size:11px;color:var(--grey);letter-spacing:.5px;text-transform:uppercase;margin-top:4px;">Digital Asset Management</div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Enter the access password to continue.</p>

    <div id="error-msg" class="error" style="display:none">
      Incorrect password. Please try again or contact the brand team.
    </div>

    <form method="POST" action="/login">
      <label for="password">Access Password</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" placeholder="Enter password" autofocus autocomplete="current-password">
        <button type="button" class="toggle-pw" onclick="togglePw()" aria-label="Show password">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <p class="footer-note">FPG internal use. For access contact <a href="mailto:mark.ninnim@financeplanning.co.uk" style="color:var(--grey);text-decoration:none;">mark.ninnim@financeplanning.co.uk</a></p>
    <p class="footer-note" style="margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="#25D366" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <a href="https://wa.me/447525932299" style="color:var(--grey);text-decoration:none;">07525 932 299</a>
    </p>
  </div>
</div>

  <script>
    // Show error if redirected with ?error=1
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error-msg').style.display = 'block';
    }

    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
