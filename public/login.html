<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPG Digital Asset Management Tool — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #003768;
      --orange:  #fcb034;
      --accent:  #2e99d5;
      --grey:    #6b7c8f;
      --light:   #f5f7fa;
      --border:  #e8ecf0;
      --dark:    #1a2a3a;
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #f5f7fa;
      margin: 0;
      overflow: hidden;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }


    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      position: relative;
    }


    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-lockup {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--blue);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 22px; height: 22px; }

    .logo-text {
      text-align: left;
    }

    .logo-text .brand {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -.2px;
      line-height: 1;
    }

    .logo-text .sub {
      display: block;
      font-size: 11px;
      color: var(--grey);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--grey);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      color: var(--dark);
      background: var(--light);
      transition: border-color .15s;
      outline: none;
      font-family: inherit;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--grey);
      padding: 4px;
      display: flex;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: .2px;
      transition: background .15s, transform .1s;
    }

    .btn:hover { background: #004a8a; }
    .btn:active { transform: scale(.99); }

    .error {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #c00;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--grey);
      margin-top: 24px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Hero triangles - bottom right -->
<svg style="position:fixed;bottom:0;right:0;width:52vw;height:85vh;pointer-events:none;" viewBox="0 0 520 500" preserveAspectRatio="xMaxYMax slice" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange triangle - right, partially off canvas -->
  <polygon points="420,180 700,500 700,500 420,500" fill="#fcb034"/>
  <polygon points="380,120 700,500 300,500" fill="#fcb034"/>
  <!-- Dark blue triangle - main, front -->
  <polygon points="210,0 520,500 0,500" fill="#003768"/>
</svg>

<div class="page-wrap">
  <div class="card">
    <div class="logo-area">
      <img src="/public-logo" alt="Finance Planning Group" style="height:56px;object-fit:contain;margin-bottom:8px;">
      <div style="font-size:11px;color:var(--grey);letter-spacing:.5px;text-transform:uppercase;margin-top:4px;">Digital Asset Management</div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Enter the access password to continue.</p>

    <div id="error-msg" class="error" style="display:none">
      Incorrect password. Please try again or contact the brand team.
    </div>

    <form method="POST" action="/login">
      <label for="password">Access Password</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" placeholder="Enter password" autofocus autocomplete="current-password">
        <button type="button" class="toggle-pw" onclick="togglePw()" aria-label="Show password">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <p class="footer-note">FPG internal use. For access contact <a href="mailto:mark.ninnim@financeplanning.co.uk" style="color:var(--grey);">mark.ninnim@financeplanning.co.uk</a></p>
  </div>
</div>

  <script>
    // Show error if redirected with ?error=1
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error-msg').style.display = 'block';
    }

    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
